name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile all sources (stdlib only, no install)
        run: |
          python -m py_compile \
            src/diagnose.py \
            src/config_loader.py \
            src/checks/*.py \
            src/report/*.py \
            src/reference/*.py \
            examples/sdk_ab_test.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  scripts:
    name: Shell + Bicep validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check deploy scripts
        run: |
          for f in deploy/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Build Bicep template
        run: |
          az bicep install
          az bicep build --file deploy/infra/main.bicep --stdout > /dev/null
